# HassBle Configuration File
#
# Host config.yaml and templates.yaml in a Git repository (e.g., GitHub).
# In the HassBle app: enter owner/repo and branch (e.g. eigger/hassble-config, main).
# The app loads config.yaml for the gateway and templates.yaml for Import template.
#
# Do NOT put any Home Assistant credentials (URL/Token) in this file. Enter them in the app.

version: 1

defaults:
  publish:
    on_change_only: true
    min_interval: 10s

devices:
  # ──────────────────────────────────────────────────────────────
  # Path C: OBD (ELM327) over BLE
  # ──────────────────────────────────────────────────────────────
  - id: car_obd
    name: "Vehicle OBD"
    source: obd
    obd:
      service_uuid: "18F0"
      tx_char_uuid: "2AF1"
      rx_char_uuid: "2AF0"
      tx_delay: 50ms
      init_commands:
        - "ATSP6"
    sensors:
      #- { key: rpm,          preset: rpm,                 update_interval: 1s }
      #- { key: speed,        preset: speed,               update_interval: 1s }
      #- { key: engine_load,  preset: engine_load,         update_interval: 1s }
      #- { key: throttle,     preset: throttle,            update_interval: 1s }
      #- { key: coolant_temp, preset: coolant_temp,        update_interval: 10s }
      #- { key: intake_temp,  preset: intake_air_temp,     update_interval: 10s }
      #- { key: ambient_temp, preset: ambient_temp,        update_interval: 30s }
      - { key: battery,      preset: battery_voltage,     update_interval: 10s }
      - { key: run_time,     preset: run_time,            update_interval: 5s }
      - { key: odometer,     preset: odometer,            update_interval: 30s }
      - key: fuel_level
        preset: fuel_level
        update_interval: 30s
        publish:
          deadband: 0.5
          min_interval: 60s
      # GM Extensions (mode 22)
      #- { key: gear,         preset: gm_current_gear,     update_interval: 1s }
      #- { key: prnd,         preset: gm_prnd_status_alt,  update_interval: 1s }
      #- { key: torque,       preset: actual_torque,       update_interval: 1s }
      #- { key: oil_pressure, preset: gm_oil_pressure,     update_interval: 2s }
      #- { key: trans_temp,   preset: gm_trans_temp,       update_interval: 10s }

  # ──────────────────────────────────────────────────────────────
  # Path B: GATT Notify & Write (Bi-directional Control)
