  #  match:
  #    manufacturer_id: 76           # Apple Inc. (0x004C) — decimal 사용 필수 (hex 0x... 파싱 불안정)
  #    manufacturer_min_length: 24
  #    manufacturer_hex_prefix: "0215"  # iBeacon 타입 마커 (0x02=subtype, 0x15=length 21)
