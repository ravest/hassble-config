# HassBle Configuration File
#
# Host config.yaml and templates.yaml in a Git repository (e.g., GitHub).
# In the HassBle app: enter owner/repo and branch (e.g. eigger/hassble-config, main).
# The app loads config.yaml for the gateway and templates.yaml for Import template.
#
# Do NOT put any Home Assistant credentials (URL/Token) in this file. Enter them in the app.

version: 1

defaults:
  publish:
    on_change_only: true
    min_interval: 10s

devices:
  # ──────────────────────────────────────────────────────────────
  # VW e-up! via ELM327 BLE (KONNWEI clone)
  # ──────────────────────────────────────────────────────────────
  - id: eup_obd
    name: "VW e-up! OBD"
    source: obd
    obd:
      mac: "22:D0:20:17:9F:9C"     # KONNWEI ELM327 clone. Remove this line
                                    # and bind the MAC in the app's Sensors
                                    # tab instead, if you prefer.
      service_uuid: "FFF0"
      tx_char_uuid: "FFF2"
      rx_char_uuid: "FFF1"
      tx_delay: 50ms
      init_commands:
        - "ATZ"
        - "ATE0"
        - "ATL0"
        - "ATS0"
        - "ATH0"
        - "ATSP6"                  # ISO 15765-4 CAN 11bit/500kbps — used by e-up modules below
    sensors:

      # ============================================================
      # Steuergerät 8C — Hybrid-Batteriemanagement (header 7E5/7ED)
      # ============================================================

      - key: hv_soc
        mode: "22"
        pid: "028C"
        formula: "a/2.55"
        unit: "%"
        device_class: battery
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 10s
        pre_commands: ["ATSH7E5"]

      - key: hv_battery_voltage
        mode: "22"
        pid: "1E3B"
        formula: "(a*256+b)/4"
        unit: "V"
        device_class: voltage
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 5s
        pre_commands: ["ATSH7E5"]

      - key: hv_battery_current
        mode: "22"
        pid: "1E3D"
        formula: "(a*256+b-2044)/4"
        unit: "A"
        device_class: current
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 5s
        pre_commands: ["ATSH7E5"]

      - key: hv_battery_temp
        mode: "22"
        pid: "2A0B"
        formula: "(a*256+b)/64"      # SIGNED 16-bit — verify sign handling, see chat notes
        unit: "°C"
        device_class: temperature
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 15s
        pre_commands: ["ATSH7E5"]

      - key: hv_cell_voltage_max
        mode: "22"
        pid: "1E33"
        formula: "(a*256+b)/4096"
        unit: "V"
        state_class: measurement
        accuracy_decimals: 3
        update_interval: 30s
        pre_commands: ["ATSH7E5"]

      - key: hv_cell_voltage_min
        mode: "22"
        pid: "1E34"
        formula: "(a*256+b)/4096"
        unit: "V"
        state_class: measurement
        accuracy_decimals: 3
        update_interval: 30s
        pre_commands: ["ATSH7E5"]

      - key: hv_charge_current_limit
        mode: "22"
        pid: "1E1B"
        formula: "a"
        unit: "A"
        state_class: measurement
        entity_category: diagnostic
        update_interval: 10s
        pre_commands: ["ATSH7E5"]

      - key: hv_discharge_current_limit
        mode: "22"
        pid: "1E1C"
        formula: "a"
        unit: "A"
        state_class: measurement
        entity_category: diagnostic
        update_interval: 10s
        pre_commands: ["ATSH7E5"]

      - key: hv_isolation_resistance
        mode: "22"
        pid: "1E17"
        formula: "(a*256+b)*10"
        unit: "kΩ"
        state_class: measurement
        entity_category: diagnostic
        update_interval: 60s
        pre_commands: ["ATSH7E5"]

      # ============================================================
      # Steuergerät 51 — Elektroantrieb / Drive motor (header 7E6/7EE)
      # ============================================================

      - key: motor_rpm
        mode: "22"
        pid: "4659"
        formula: "a*256+b"
        unit: "rpm"
        state_class: measurement
        update_interval: 1s
        pre_commands: ["ATSH7E6"]

      - key: motor_torque
        mode: "22"
        pid: "3EE9"
        formula: "(a*256+b)/16"      # SIGNED — see chat notes
        unit: "Nm"
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 1s
        pre_commands: ["ATSH7E6"]

      - key: motor_power_electrical
        mode: "22"
        pid: "4656"
        formula: "(a*256+b)/64"      # SIGNED — see chat notes
        unit: "kW"
        state_class: measurement
        accuracy_decimals: 2
        update_interval: 1s
        pre_commands: ["ATSH7E6"]

      - key: motor_power_mechanical
        mode: "22"
        pid: "4658"
        formula: "(a*256+b)/64"      # SIGNED — see chat notes
        unit: "kW"
        state_class: measurement
        accuracy_decimals: 2
        update_interval: 1s
        pre_commands: ["ATSH7E6"]

      - key: motor_temp
        mode: "22"
        pid: "3E94"
        formula: "(a*256+b)/64"      # SIGNED — see chat notes
        unit: "°C"
        device_class: temperature
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 15s
        pre_commands: ["ATSH7E6"]

      - key: traction_dc_link_voltage
        mode: "22"
        pid: "3E93"
        formula: "(a*256+b)/32"
        unit: "V"
        device_class: voltage
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 5s
        pre_commands: ["ATSH7E6"]

      - key: accelerator_pedal
        mode: "22"
        pid: "F449"
        formula: "a/2.55"
        unit: "%"
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 1s
        pre_commands: ["ATSH7E6"]
