  # Parking beacon — instance_mode: shared → MAC 무관, manufacturer 0x035D 광고가 하나의 엔티티 공유
  # payload 14바이트: [0]=04(응답타입), [1..6]=KeyMAC, [7..10]=월·일·시·분, [11]=층(256-raw), [12..13]=구역코드
  # 04xx: 주차위치 응답 비콘, 07xx: SmartKey 인증(22B 암호화), 02xx: 출입 이벤트(6B) — prefix "04" 로 응답만 매칭
  - id: parking_beacon
    name: "Parking Beacon"
    source: advertisement
    instance_mode: shared
    match:
      manufacturer_id: 861            # 0x035D
      manufacturer_hex_prefix: "04"   # 응답 비콘만 매칭 (07=SmartKey 인증, 02=출입 이벤트 제외)
    sensors:
      - key: parking_time
        device_class: timestamp
        icon: mdi:clock-time-four-outline
        source_field: manufacturer_data
        length: 14
        decode: { offset: 7, length: 4, type: timestamp }
      - key: parking_floor
        icon: mdi:layers-outline
        source_field: manufacturer_data
        length: 14
        accuracy_decimals: 0
        decode: { offset: 11, length: 1, type: uint8, scale: -1, offset_value: 256 }
      - key: parking_location
        platform: text_sensor
        icon: mdi:map-marker-outline
        source_field: manufacturer_data
        length: 14
        decode: { offset: 12, length: 2, type: string }

  # ──────────────────────────────────────────────────────────────
  # Path C: OBD (ELM327) over BLE
  # ──────────────────────────────────────────────────────────────
  - id: car_obd
    name: "Vehicle OBD"
    source: obd
    obd:
      service_uuid: "18F0"
      tx_char_uuid: "2AF1"
      rx_char_uuid: "2AF0"
      tx_delay: 50ms
      init_commands:
        - "ATSP6"
    sensors:
      #- { key: rpm,          preset: rpm,                 update_interval: 1s }
      #- { key: speed,        preset: speed,               update_interval: 1s }
      #- { key: engine_load,  preset: engine_load,         update_interval: 1s }
      #- { key: throttle,     preset: throttle,            update_interval: 1s }
      #- { key: coolant_temp, preset: coolant_temp,        update_interval: 10s }
      #- { key: intake_temp,  preset: intake_air_temp,     update_interval: 10s }
      #- { key: ambient_temp, preset: ambient_temp,        update_interval: 30s }
      - { key: battery,      preset: battery_voltage,     update_interval: 10s }
      - { key: run_time,     preset: run_time,            update_interval: 5s }
      - { key: odometer,     preset: odometer,            update_interval: 30s }
      - key: fuel_level
        preset: fuel_level
        update_interval: 30s
        publish:
          deadband: 0.5
          min_interval: 60s
      # GM Extensions (mode 22)
      #- { key: gear,         preset: gm_current_gear,     update_interval: 1s }
      #- { key: prnd,         preset: gm_prnd_status_alt,  update_interval: 1s }
      #- { key: torque,       preset: actual_torque,       update_interval: 1s }
      #- { key: oil_pressure, preset: gm_oil_pressure,     update_interval: 2s }
      #- { key: trans_temp,   preset: gm_trans_temp,       update_interval: 10s }

