# HassBle Configuration File — MINIMAL "trip computer" variant
#
# 16 Jul: replaced the full 25-sensor config with a focused set: SOC,
# odometer, trip consumption, distance, plus power+speed (needed to
# derive instant consumption in Home Assistant — see notes below).
# Full previous config backed up as config-full-backup.yaml in this repo
# for reference / manual restore later (the app only ever reads whatever
# is literally named config.yaml — it can't run two configs at once).
#
# IMPORTANT: "instant consumption" and "time traveled" are NOT included
# here as OBD sensors — no PID exists for either on this car, confirmed
# via exhaustive search. Both must be built as Home Assistant template
# sensor / timer, using the hv_battery_power and vehicle_speed sensors
# below as inputs. See the separate HA snippet provided alongside this
# file.

version: 1

defaults:
  publish:
    on_change_only: true
    min_interval: 60s

devices:
  - id: eup_all
    name: "VW e-up! OBD"
    source: obd
    obd:
      mac: "22:D0:20:17:9F:9C"
      service_uuid: "FFF0"
      tx_char_uuid: "FFF2"
      rx_char_uuid: "FFF1"
      tx_delay: 50ms
      init_commands:
        - "ATZ"
        - "ATE0"
        - "ATL0"
        - "ATS0"
        - "ATH0"
        - "ATSP6"
    sensors:

      # ============================================================
      # SOC — confirmed reliable throughout prior testing.
      # ============================================================
      - key: hv_soc
        mode: "22"
        pid: "028C"
        formula: "a/2.55"
        unit: "%"
        device_class: battery
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 60s
        pre_commands: ["ATSH7E5"]

      # ============================================================
      # Supporting sensors for HA-side instant consumption calc
      # (power ÷ speed). Faster interval per user request — instant
      # consumption is the one value meant to feel "live".
      # ============================================================

      - key: hv_battery_power
        mode: "22"
        pid: "1485"
        formula: "(((a*256+b)+32768)%65536-32768)/250"
        unit: "kW"
        device_class: power
        state_class: measurement
        accuracy_decimals: 2
        update_interval: 5s
        pre_commands: ["ATSH7E0"]

      - key: vehicle_speed_std
        preset: speed
        update_interval: 5s
        pre_commands: ["ATSH7DF"]
        publish: { min_interval: 5s }

      # ============================================================
      # Trip / average consumption — the trip computer's own value,
      # confirmed documented (GoingElectric SG17 wiki). RISK: lives on
      # the same header (714/77E) that caused estimated_range to stall
      # the entire polling queue previously. Watch Logs closely after
      # enabling — pull this sensor immediately if [LINK] Polling gaps
      # reappear, same failure signature as before.
      # ============================================================

      # 17 Jul: reverted /5 back to /10 — was set but never pushed live.
      # The "/5" correction was based on
      # comparing our old /10 reading (12.6) against ONE dashboard value
      # without realizing the car has TWO separate trip counters (Trip 1:
      # 30-40, Trip 2: 11). Our old /10 value is actually much closer to
      # Trip 2 (11) than /5 would be (~25). Also: OVMS's own source code
      # has NO direct consumption PID at all — they derive it from
      # energy/distance instead — so this PID was never corroborated by
      # that source either, only the GoingElectric wiki. Genuinely
      # unconfirmed which (if either) trip counter this PID represents.
      # Renamed with _UNCONFIRMED suffix per project convention.
      - key: trip_avg_consumption_UNCONFIRMED
        mode: "22"
        pid: "22E3"
        formula: "(a*256+b)/10"
        unit: "kWh/100km"
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 60s
        pre_commands: ["ATSH714", "ATCRA77E"]

      # 17 Jul: NEW — the real dashboard-matching SOC, confirmed via OVMS
      # (Open Vehicle Monitoring System) production source code. PID
      # 0x1DD0 lives on a previously-unused ECU (VWUP_CHG_MGMT, "HV
      # charge management"). OVMS's own code comment: "This SOC matches
      # the instrument cluster SOC and is available while driving and
      # while charging, so we use this as the standard user SOC." This
      # is likely the best SOC source for EVCC charge-limiting, since it
      # works specifically during charging (unlike the other SOC PID we
      # tried and disproved, 0x1164, which OVMS's own comments say only
      # "loosely correlates" to the dashboard and updates while driving
      # only).
      - key: hv_soc_dashboard
        mode: "22"
        pid: "1DD0"
        formula: "a/2"
        unit: "%"
        device_class: battery
        state_class: measurement
        accuracy_decimals: 1
        update_interval: 30s
        pre_commands: ["ATSH765", "ATCRA7CF"]

      # ============================================================
      # Odometer ("Wegstrecke" PID, confirmed 17 Jul). Originally added
      # under the name distance_traveled — live testing showed a value
      # of 66,620.0 km, far too large for a trip counter, confirming
      # this is actually the real lifetime odometer despite the
      # misleading German label. Renamed accordingly. Still shares the
      # 714/77E header risk, but has now worked reliably across two
      # separate sessions with no stall.
      #
      # The old multi-frame odometer attempt (PID 02BD, header 7E5) has
      # now failed on all THREE attempts across this whole project —
      # removed for good. This PID above replaces it entirely.
      # ============================================================

      - key: odometer
        mode: "22"
        pid: "2203"
        formula: "(a*256+b)*10"
        unit: "km"
        state_class: total_increasing
        update_interval: 60s
        pre_commands: ["ATSH714", "ATCRA77E"]
