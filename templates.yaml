# Device templates for HassBle app → Sensors tab → Import template
# Loaded from repo root as templates.yaml (same branch as config.yaml)

templates:
  - id: vw_eup_battery
    name: "VW e-up! HV Battery"
    description: "SOC, HV voltage/current, temp, cell spread, isolation (Steuergerät 8C, header 7E5/7ED)"
    device:
      id: eup_hv_battery
      name: "VW e-up! HV Battery"
      source: obd
      obd:
        service_uuid: "FFF0"
        tx_char_uuid: "FFF2"
        rx_char_uuid: "FFF1"
        tx_delay: 50ms
        init_commands:
          - "ATZ"
          - "ATE0"
          - "ATL0"
          - "ATS0"
          - "ATH0"
          - "ATSP6"
      sensors:
        - key: tier1_hv_soc
          mode: "22"
          pid: "028C"
          formula: "a/2.55"
          unit: "%"
          device_class: battery
          state_class: measurement
          accuracy_decimals: 1
          update_interval: 10s
          pre_commands: ["ATSH7E5"]

        - key: tier1_hv_battery_voltage
          mode: "22"
          pid: "1E3B"
          formula: "(a*256+b)/4"
          unit: "V"
          device_class: voltage
          state_class: measurement
          accuracy_decimals: 1
          update_interval: 5s
          pre_commands: ["ATSH7E5"]

        - key: tier1_hv_battery_current
          mode: "22"
          pid: "1E3D"
          formula: "(a*256+b-2044)/4"
          unit: "A"
          device_class: current
          state_class: measurement
          accuracy_decimals: 1
          update_interval: 5s
          pre_commands: ["ATSH7E5"]

        - key: tier2_hv_battery_temp
          mode: "22"
          pid: "2A0B"
          formula: "(a*256+b)/64"
          unit: "°C"
          device_class: temperature
          state_class: measurement
          accuracy_decimals: 1
          update_interval: 15s
          pre_commands: ["ATSH7E5"]

        - key: tier2_hv_cell_voltage_max
          mode: "22"
          pid: "1E33"
          formula: "(a*256+b)/4096"
          unit: "V"
          state_class: measurement
          accuracy_decimals: 3
          update_interval: 30s
          pre_commands: ["ATSH7E5"]

        - key: tier2_hv_cell_voltage_min
          mode: "22"
          pid: "1E34"
          formula: "(a*256+b)/4096"
          unit: "V"
          state_class: measurement
          accuracy_decimals: 3
          update_interval: 30s
          pre_commands: ["ATSH7E5"]

        - key: tier2_hv_isolation_resistance
          mode: "22"
          pid: "1E17"
          formula: "(a*256+b)*10"
          unit: "kΩ"
          state_class: measurement
          entity_category: diagnostic
          update_interval: 60s
          pre_commands: ["ATSH7E5"]

  - id: vw_eup_drive
    name: "VW e-up! Drive Motor"
    description: "RPM, torque, power, temps, traction voltage (Steuergerät 51, header 7E6/7EE)"
    device:
      id: eup_drive
      name: "VW e-up! Drive Motor"
      source: obd
      obd:
        service_uuid: "FFF0"
        tx_char_uuid: "FFF2"
        rx_char_uuid: "FFF1"
        tx_delay: 50ms
        init_commands:
          - "ATZ"
          - "ATE0"
          - "ATL0"
          - "ATS0"
          - "ATH0"
          - "ATSP6"
      sensors:
        - key: tier3_motor_rpm
          mode: "22"
          pid: "4659"
          formula: "a*256+b"
          unit: "rpm"
          state_class: measurement
          update_interval: 1s
          pre_commands: ["ATSH7E6"]

        - key: tier3_motor_torque
          mode: "22"
          pid: "3EE9"
          formula: "(a*256+b)/16"
          unit: "Nm"
          state_class: measurement
          accuracy_decimals: 1
          update_interval: 1s
          pre_commands: ["ATSH7E6"]

        - key: tier3_motor_power_electrical
          mode: "22"
          pid: "4656"
          formula: "(a*256+b)/64"
          unit: "kW"
          state_class: measurement
          accuracy_decimals: 2
          update_interval: 1s
          pre_commands: ["ATSH7E6"]

        - key: tier3_motor_power_mechanical
          mode: "22"
          pid: "4658"
          formula: "(a*256+b)/64"
          unit: "kW"
          state_class: measurement
          accuracy_decimals: 2
          update_interval: 1s
          pre_commands: ["ATSH7E6"]

        - key: tier2_motor_temp
          mode: "22"
          pid: "3E94"
          formula: "(a*256+b)/64"
          unit: "°C"
          device_class: temperature
          state_class: measurement
          accuracy_decimals: 1
          update_interval: 15s
          pre_commands: ["ATSH7E6"]

        - key: tier3_traction_dc_link_voltage
          mode: "22"
          pid: "3E93"
          formula: "(a*256+b)/32"
          unit: "V"
          device_class: voltage
          state_class: measurement
          accuracy_decimals: 1
          update_interval: 5s
          pre_commands: ["ATSH7E6"]

        - key: tier3_accelerator_pedal
          mode: "22"
          pid: "F449"
          formula: "a/2.55"
          unit: "%"
          state_class: measurement
          accuracy_decimals: 1
          update_interval: 1s
          pre_commands: ["ATSH7E6"]

  - id: vw_eup_misc
    name: "VW e-up! Speed / 12V / Range / Odometer"
    description: "Main ECU + cluster: speed, 12V battery, estimated range, odometer (experimental)"
    device:
      id: eup_misc
      name: "VW e-up! Misc"
      source: obd
      obd:
        service_uuid: "FFF0"
        tx_char_uuid: "FFF2"
        rx_char_uuid: "FFF1"
        tx_delay: 50ms
        init_commands:
          - "ATZ"
          - "ATE0"
          - "ATL0"
          - "ATS0"
          - "ATH0"
          - "ATSP6"
      sensors:
        - key: tier3_vehicle_speed
          mode: "22"
          pid: "F40D"
          formula: "a"
          unit: "km/h"
          device_class: speed
          state_class: measurement
          update_interval: 1s
          pre_commands: ["ATSH7E0"]

        - key: tier1_battery_12v_voltage
          mode: "22"
          pid: "105A"
          formula: "(a*256+b)*0.02"
          unit: "V"
          device_class: voltage
          state_class: measurement
          accuracy_decimals: 2
          update_interval: 30s
          pre_commands: ["ATSH7E0"]

        - key: tier3_estimated_range
          mode: "22"
          pid: "22E0"
          formula: "a*256+b"
          unit: "km"
          state_class: measurement
          update_interval: 30s
          pre_commands: ["ATSH714", "ATCRA77E"]

        # Odometer removed — no working PID found for this car (see
        # config.yaml comments for details).
